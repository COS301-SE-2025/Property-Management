spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/property_management_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        
  flyway:
    enabled: false

# Test AWS configuration
aws:
  accessKeyId: test-access-key
  secretAccessKey: test-secret-key
  region: us-east-1
  bucket-name: test-bucket

logging:
  level:
    com.example.propertymanagement: DEBUG
    org.testcontainers: INFO